name: Polymarket Consensus Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Clean runs take ~20-25s against a 2min trigger interval, so a healthy run is
# never still going when the next one fires - cancel-in-progress essentially
# never touches a normal run. What it does fix: GitHub's own "runner not
# acquired" stalls (a confirmed recurring GitHub Actions incident, not our
# code) hold this slot in queue for ~15min regardless of our job timeout,
# since that stall happens before the job even starts executing. With
# cancel-in-progress: true, the next trigger kills the stuck one immediately
# instead of waiting out GitHub's ~15min internal give-up.
concurrency:
  group: polymarket-monitor-run
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Clean runs measured at ~23s (checkout+setup-node+monitor.js+commit).
    # Without a cap, a GitHub-side hiccup (stuck runner acquisition, a hung
    # step) can hold this concurrency group's slot for 10+ minutes, and every
    # trigger that arrives during that time cascades into cancelling the one
    # before it. 2min gives ~5x margin over normal while matching the 2min
    # trigger interval, so a hang dies before the next trigger even queues.
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MY_WALLET: ${{ secrets.MY_WALLET }}
          FILTER_EXITS_TO_MY_WALLET: ${{ secrets.FILTER_EXITS_TO_MY_WALLET }}
        run: node monitor.js

      - name: Commit updated state
        run: |
          git config user.name "polymarket-consensus-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if [ -f history.jsonl ]; then git add history.jsonl; fi
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update consensus state"
          for i in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) - another push landed first. Adopting it:"
            echo "it was computed from the same live data this run just used, so"
            echo "nothing meaningful is lost - the next run recomputes fresh anyway."
            git fetch origin main
            git reset --hard origin/main
            sleep 2
          done
          echo "Could not push state after retries - non-fatal, next run recomputes from live data."
